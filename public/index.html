<!DOCTYPE html>
<html>
<head>
<style>

body {
    direction: rtl;
    text-align: right;
    font-family: Arial;
    margin: 30px;
}

input, button {
    margin: 4px;
}

</style>

<style>

body{
direction:rtl;
font-family:Arial;
margin:20px;
}

#gameLog{
position:fixed;
left:10px;
top:20px;
width:250px;
height:90%;
overflow:auto;
border:1px solid gray;
padding:10px;
background:#f5f5f5;
}

</style>

<meta charset="UTF-8">
<title>קוביות</title>
</head>

<body>

<h1>קוביות</h1>

<div id="gameLog">
<h3>מהלך המשחק</h3>
<div id="messages"></div>
</div>

<h2 id="winner"></h2>

<input id="nameInput" placeholder="שם">
<button onclick="join()">הצטרף</button>

<hr>

<h2>שחקנים</h2>
<ul id="players"></ul>

<button onclick="startGame()">התחל משחק</button>

<hr>

<h3>סטטיסטיקה</h3>
<p id="stats">---</p>

<hr>

<h2>קוביות שלי</h2>
<ul id="dice"></ul>

<hr>

<h2>הימור נוכחי</h2>
<p id="currentBet">אין</p>

<hr>

<h3>פעולות</h3>

<input id="betCount" placeholder="כמות">
<input id="betNumber" placeholder="מספר 2-6">

<br><br>

<button onclick="placeBet()">המר</button>
<button onclick="callLiar()">שקר</button>
<button onclick="callExact()">בול</button>
<button onclick="halfBet()">חצי → 1</button>

<br><br>

<input id="backNumber" placeholder="חזרה 2-6">
<button onclick="backToNormal()">חזרה מג'וקר</button>

<hr>

<h3>חשיפת קוביות</h3>
<div id="reveal"></div>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();


function addMessage(text){

    const box = document.getElementById("messages");

    const msg = document.createElement("div");
    msg.innerText = text;

    box.prepend(msg);
}

socket.on("gameMessage", (msg)=>{
    addMessage(msg);
});

let myId = null;
let joined = false;

socket.on("connect", () => {
    myId = socket.id;
});

function join(){

    const name = document.getElementById("nameInput").value;

    if(!name || joined) return;

    socket.emit("joinGame", name);

    joined = true;
}

socket.on("gameState", (state)=>{

    const list = document.getElementById("players");
    list.innerHTML="";

    state.players.forEach(p=>{

        const li=document.createElement("li");

        li.innerText =
            `${p.name} (${p.diceCount})` +
            (state.turnPlayerId === p.id ? " 🎯":"");

        list.appendChild(li);
    });

    if(state.stats){

        document.getElementById("stats").innerText =
            `סה"כ קוביות: ${state.stats.totalDice} | ממוצע: ${state.stats.expected.toFixed(1)}`;
    }

});

socket.on("yourDice",(dice)=>{

    const list=document.getElementById("dice");
    list.innerHTML="";

    dice.forEach(d=>{

        const li=document.createElement("li");
        li.innerText=d;
        list.appendChild(li);
    });
});

socket.on("updateBet",(bet)=>{

    document.getElementById("currentBet").innerText =
        bet ? `${bet.playerName}: ${bet.count} x ${bet.number}` : "אין";
});

socket.on("gameOver",(data)=>{

    document.getElementById("winner").innerText =
        "🏆 מנצח: " + data.winner;
});

socket.on("revealDice",(data)=>{

    const div=document.getElementById("reveal");
    div.innerHTML="";

    data.forEach(p=>{

        const box=document.createElement("div");

        box.innerHTML =
            `<b>${p.name}</b>: ${p.dice.join(", ")}`;

        div.appendChild(box);
    });
});

function placeBet(){

    socket.emit("placeBet",{

        count:parseInt(document.getElementById("betCount").value),
        number:parseInt(document.getElementById("betNumber").value)
    });
}

function callLiar(){
    socket.emit("callLiar");
}

function callExact(){
    socket.emit("callExact");
}

function startGame() {
    socket.emit("startGame");
}

function halfBet(){
    socket.emit("halfToJoker");
}

function backToNormal(){

    const num=parseInt(document.getElementById("backNumber").value);

    if(!num) return;

    socket.emit("backToNormal",num);
}

</script>

</body>
</html>
